<div class="container mb-5">
  <div class="row g-3">
    <div class="col-6 col-md-4 col-lg-2-4">
      <div class="stats-card bg-white p-3 rounded-4 shadow-sm border-bottom border-4 border-dark">
        <small class="text-muted text-uppercase fw-bold">Total</small>
        <h3 class="m-0 fw-black text-dark">{{ total }}</h3>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2-4">
      <div class="stats-card bg-white p-3 rounded-4 shadow-sm border-bottom border-4 border-warning">
        <small class="text-warning text-uppercase fw-bold">⏳ Pendientes</small>
        <h3 class="m-0 fw-black text-warning">{{ pendientes }}</h3>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2-4">
      <div class="stats-card bg-white p-3 rounded-4 shadow-sm border-bottom border-4 border-primary">
        <small class="text-primary text-uppercase fw-bold">🎮 Jugando</small>
        <h3 class="m-0 fw-black text-primary">{{ jugando }}</h3>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2-4">
      <div class="stats-card bg-white p-3 rounded-4 shadow-sm border-bottom border-4 border-success">
        <small class="text-success text-uppercase fw-bold">🏆 Completados</small>
        <h3 class="m-0 fw-black text-success">{{ completados }}</h3>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg-2-4">
      <div class="stats-card bg-white p-3 rounded-4 shadow-sm border-bottom border-4 border-danger">
        <small class="text-danger text-uppercase fw-bold">❌ Abandonados</small>
        <h3 class="m-0 fw-black text-danger">{{ abandonados }}</h3>
      </div>
    </div>
  </div>
</div>
