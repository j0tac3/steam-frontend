<div class="stats-glass-card mb-4 mx-auto">
  
  <div class="header-area d-flex justify-content-between align-items-center mb-1" 
       (click)="filtroSeleccionado.emit('todos')"
       [class.active-filter]="filtroActual() === 'todos'">
    <div>
      <h5 class="mb-0">Mi Colección</h5>
      <small>Total: <strong>{{ total() }}</strong> juegos <span class="opacity-50">(clic para ver todos)</span></small>
    </div>
    <div class="icon fs-3">📚</div>
  </div>

  <div class="premium-progress">
    <div class="bar success" [style.width]="calcularPorcentaje(completados())"></div>
    <div class="bar primary" [style.width]="calcularPorcentaje(jugando())"></div>
    <div class="bar warning" [style.width]="calcularPorcentaje(pendientes())"></div>
    <div class="bar danger" [style.width]="calcularPorcentaje(abandonados())"></div>
  </div>

  <div class="legend-grid">
    <div class="stat-pill" 
         [class.active-filter]="filtroActual() === 'completado'"
         (click)="filtroSeleccionado.emit('completado')">
      <span class="label"><span class="dot" style="background: #10b981;"></span> Completados</span>
      <span class="value">{{ completados() }}</span>
    </div>

    <div class="stat-pill" 
         [class.active-filter]="filtroActual() === 'jugando'"
         (click)="filtroSeleccionado.emit('jugando')">
      <span class="label"><span class="dot" style="background: #3b82f6;"></span> Jugando</span>
      <span class="value">{{ jugando() }}</span>
    </div>

    <div class="stat-pill" 
         [class.active-filter]="filtroActual() === 'pendiente'"
         (click)="filtroSeleccionado.emit('pendiente')">
      <span class="label"><span class="dot" style="background: #f59e0b;"></span> Pendientes</span>
      <span class="value">{{ pendientes() }}</span>
    </div>

    <div class="stat-pill" 
         [class.active-filter]="filtroActual() === 'abandonado'"
         (click)="filtroSeleccionado.emit('abandonado')">
      <span class="label"><span class="dot" style="background: #ef4444;"></span> Abandonados</span>
      <span class="value">{{ abandonados() }}</span>
    </div>
  </div>
</div>
