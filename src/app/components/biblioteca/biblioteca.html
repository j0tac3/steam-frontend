<div class="main-container bg-light min-vh-100">
  <nav class="navbar navbar-dark bg-dark px-4 py-3 shadow-sm mb-4">
    <h2 class="text-white m-0 fs-4">Mi Biblioteca 📚</h2>
    <button class="btn btn-outline-danger btn-sm fw-bold border-2" (click)="cerrarSesion()">
      CERRAR SESIÓN 🚪
    </button>
  </nav>

  <header class="search-section container mb-5">
    <div class="search-box p-4 bg-white rounded-4 shadow-sm">
      <h1 class="text-center mb-4 fw-black text-dark">Steam Manager 🎮</h1>
      
      <div class="btn-group btn-group-sm mb-3 w-100 shadow-sm">
        <button class="btn btn-outline-dark w-50 py-2 fw-bold" 
                [class.active]="motorBusqueda === 'igdb'"
                (click)="motorBusqueda = 'igdb'">
          🚀 IGDB (Multiplataforma)
        </button>
        <button class="btn btn-outline-primary w-50 py-2 fw-bold" 
                [class.active]="motorBusqueda === 'steam'"
                (click)="motorBusqueda = 'steam'">
          🎮 Steam (PC)
        </button>
      </div>

      <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
        <input #txtBusqueda (keyup.enter)="buscar(txtBusqueda.value)" type="text" 
               class="form-control border-0 px-4" 
               [placeholder]="motorBusqueda === 'igdb' ? 'Busca un juego...' : 'Busca en Steam...'">
        <button class="btn btn-success px-5 fw-bold" (click)="buscar(txtBusqueda.value)">
          BUSCAR
        </button>
      </div>

      @if (searchResults().length > 0) {
        <div class="row g-4 mt-4">
          @for (game of searchResults(); track $index) {
            <div class="col-6 col-sm-4 col-md-3 col-lg-2">
              <app-search-game-card 
                [game]="game"
                (add)="guardarJuego($event)"
                (verInfo)="verDetalles($event)"> 
              </app-search-game-card>
            </div>
          }
        </div>
        <div class="text-center mt-4">
          <button class="btn btn-link text-muted btn-sm" (click)="searchResults.set([])">Limpiar resultados</button>
        </div>
      }
    </div>
  </header>

  <app-stats-panel 
    [total]="totalJuegos()"
    [pendientes]="pendientes()"
    [jugando]="jugando()"
    [completados]="completados()"
    [abandonados]="abandonado()">
  </app-stats-panel>

  <div class="container mb-5">
    <div class="toolbar p-3 bg-white rounded-4 shadow-sm d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
      <div class="search-local flex-grow-1">
        <input type="text" class="form-control form-control-sm rounded-pill px-3" 
               placeholder="🔍 Filtrar mi colección..." [value]="filtroTexto()"
               (input)="filtroTexto.set($any($event.target).value)">
      </div>
      <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-secondary" [class.active]="filtroEstado() === 'todos'" (click)="filtroEstado.set('todos')">Todos</button>
          <button class="btn btn-outline-warning" [class.active]="filtroEstado() === 'pendiente'" (click)="filtroEstado.set('pendiente')">⏳</button>
          <button class="btn btn-outline-primary" [class.active]="filtroEstado() === 'jugando'" (click)="filtroEstado.set('jugando')">🎮</button>
          <button class="btn btn-outline-success" [class.active]="filtroEstado() === 'completado'" (click)="filtroEstado.set('completado')">🏆</button>
          <button class="btn btn-outline-danger" [class.active]="filtroEstado() === 'abandonado'" (click)="filtroEstado.set('abandonado')">❌</button>
      </div>
    </div>

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-4">
      @for (game of bibliotecaFiltrada(); track game.id) {
        <div class="col">
          <app-game-card 
            [game]="game"
            (verInfo)="verDetalles($event)"
            (borrar)="borrarJuego($event)"
            (cambiarEstado)="actualizarEstado($event.id, $event.nuevoEstado)">
          </app-game-card>
        </div>
      }
    </div>

    @if (bibliotecaFiltrada().length === 0 && !filtroTexto()) {
      <div class="text-center py-5">
        <h5 class="text-muted">Aún no tienes juegos en esta categoría 🕹️</h5>
      </div>
    }
  </div>

  <app-game-modal 
    [juegoDetalle]="juegoDetalle()" 
    [cargandoDetalle]="cargandoDetalle()"
    [esBiblioteca]="juegoDetalle()?.status !== undefined" 
    (guardarDiario)="guardarDiario($event)">
  </app-game-modal>

</div>
