<div class="main-container min-vh-100">
  <nav class="navbar navbar-dark shadow-sm mb-4 py-3">
    <div class="container">
      <div class="d-flex align-items-center">
        <span class="fs-2 me-2">🎮</span> 
        <h2 class="text-white m-0 fs-4 fw-bold letter-spacing-1">Mi Biblioteca</h2>
      </div>
      
      <button class="btn-logout" (click)="cerrarSesion()">
        CERRAR SESIÓN 🚪
      </button>
    </div>
  </nav>

  <header class="container mt-4 mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-10"> 
        <app-game-search 
          [misJuegos]="myLibrary()"
          (addGame)="guardarJuego($event)"
          (viewDetails)="verDetalles($event)">
        </app-game-search>
      </div>
    </div>
  </header>

  <main class="container mb-5">
    
    <div class="row g-4 mb-4">
      <div class="col-12">
        <app-stats-panel 
          [total]="totalJuegos()"
          [pendientes]="pendientes()"
          [jugando]="jugando()"
          [completados]="completados()"
          [abandonados]="abandonado()"
          [filtroActual]="filtroEstado()"
          (filtroSeleccionado)="filtroEstado.set($event)">
        </app-stats-panel>
      </div>

      <div class="col-12">
        <app-game-filters 
          [filtroTexto]="filtroTexto()" 
          [filtroEstado]="filtroEstado()"
          (textoCambiado)="filtroTexto.set($event)"
          [totalMostrados]="bibliotecaFiltrada().length"
          (estadoCambiado)="filtroEstado.set($event)">
        </app-game-filters>
      </div>
    </div>

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-6 g-4">
      @for (game of bibliotecaFiltrada(); track game.id) {
        <div class="col">
          <app-game-card 
            [game]="game"
            (verInfo)="verDetalles($event)"
            (borrar)="borrarJuego($event)"
            (cambiarEstado)="actualizarEstado($event.id, $event.nuevoEstado)">
          </app-game-card>
        </div>
      }
    </div>

    @if (bibliotecaFiltrada().length === 0) {
      <div class="text-center py-5">
        <div class="display-1 mb-3">🕹️</div>
        <h5 class="text-muted fw-bold">No se encontraron juegos con estos filtros</h5>
        <button class="btn btn-outline-light mt-3" (click)="resetFiltros()">Mostrar todos</button>
      </div>
    }
  </main>
</div>
