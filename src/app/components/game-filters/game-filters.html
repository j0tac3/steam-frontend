<div class="search-section d-flex justify-content-center mb-4">
  <div class="search-wrapper position-relative">
    <span class="search-icon">🔍</span>
    <input 
      type="text" 
      class="form-control custom-search-input shadow-sm" 
      placeholder="Filtrar por título en mi biblioteca..."
      [value]="filtroTexto()"
      (input)="textoCambiado.emit($any($event.target).value)">
    
    <div class="results-counter text-muted">
      <strong>{{ totalMostrados() }}</strong> {{ totalMostrados() === 1 ? 'juego' : 'juegos' }}
    </div>
  </div>
</div>
